<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寒宮</title>
    <style>
        :root {
            --red: #ff4d4d;
            --orange: #ffa500;
            --purple: #a020f0;
            --blue: #1e90ff;
            --green: #32cd32;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --admin-color: #d9534f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

            nav button {
                padding: 8px 12px;
                border: none;
                background: #eee;
                cursor: pointer;
                border-radius: 5px;
                font-weight: bold;
                font-size: 14px;
            }

                nav button.active {
                    background: #333;
                    color: white;
                }

        .admin-badge {
            background: var(--admin-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            margin-right: 10px;
        }

        .page {
            display: none;
        }

            .page.active {
                display: block;
            }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button.add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .member-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #666;
            cursor: pointer;
        }

        .flower-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .flower-card {
            background: var(--card-bg);
            padding: 5px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            .flower-card img {
                width: 100%;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 4px;
            }

            .flower-card .name {
                font-size: 13px;
                margin-top: 4px;
                font-weight: bold;
                width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

        .grade-仙品 {
            color: var(--red);
        }

        .grade-華品 {
            color: var(--orange);
        }

        .grade-珍品 {
            color: var(--purple);
        }

        .grade-普品 {
            color: var(--blue);
        }

        .grade-凡品 {
            color: var(--green);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #eee;
            padding: 10px 8px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 10px;
        }

            .form-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            .form-group input, .form-group select {
                width: 100%;
                box-sizing: border-box;
            }

        @media screen and (max-width: 600px) {
            th, td {
                padding: 5px 2px;
                font-size: 11px;
            }

            .controls input {
                width: 46%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#555;">正在同步雲端...</p>
    </div>

    <header>
        <nav>
            <button onclick="showPage('members')" id="btn-members" class="active">成員資料</button>
            <button onclick="showPage('flowers')" id="btn-flowers">花朵清單</button>
            <button onclick="showPage('competitions')" id="btn-competitions">競賽清單</button>
        </nav>
        <div>
            <span id="admin-tag" class="admin-badge">管理員模式</span>
            <button id="login-btn" onclick="openLoginModal()" style="padding: 5px 10px;">管理員登入</button>
        </div>
    </header>

    <div id="page-members" class="page active">
        <div class="controls">
            <input type="text" id="member-search" placeholder="搜尋名稱/ID..." oninput="renderMembers()">
            <button class="add-btn" onclick="showAddMember()">+ 新增成員</button>
        </div>
        <div id="member-card-grid" class="member-grid"></div>
    </div>

    <div id="page-flowers" class="page">
        <div class="controls">
            <input type="text" id="flower-search" placeholder="搜尋花朵..." oninput="renderFlowers()">
            <button class="add-btn" onclick="openFlowerModal()">+ 新增花朵</button>
        </div>
        <div id="flower-grid" class="flower-grid"></div>
    </div>

    <div id="page-competitions" class="page">
        <div class="controls">
            <input type="text" id="r-search-name" placeholder="🔍 搜尋成員名稱..." oninput="renderRecords()">
            <input type="text" id="r-search-flower" placeholder="🌸 搜尋參賽花朵..." oninput="renderRecords()">
            <button class="add-btn" onclick="showAddRecord()">+ 新增紀錄</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>成員名稱</th>
                        <th>參賽花朵</th>
                        <th style="width: 100px;">管理</th>
                    </tr>
                </thead>
                <tbody id="r-list-body"></tbody>
            </table>
        </div>
    </div>

    <div id="main-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="record-modal" class="modal" onclick="closeRecordModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeRecordModal()">&times;</span>
            <h3>競賽紀錄資料</h3>
            <div class="form-group">
                <label>選擇成員</label>
                <select id="r-member-select" onchange="loadMemberFlowersForRecord()" style="width:100%;">
                    <option value="">-- 請選擇成員 --</option>
                </select>
            </div>
            <div class="form-group">
                <label>勾選本次參賽花朵</label>
                <div id="r-flower-pick-area" style="max-height:250px; overflow-y:auto; border:1px solid #ddd; padding:10px; border-radius:4px;">
                    請先選擇成員...
                </div>
            </div>
            <button class="add-btn" onclick="saveRecord()" style="width:100%; margin-top:10px;">儲存紀錄</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxphCpTVnjQurd5VLQM5B5NrSSBmPfkv0PqmSMAtNeO51M554i0bh4s_m0tad7I45zO/exec";
        let members = [];
        let flowers = [];
        let competitions = [];
        let isAdmin = false;

        async function init() {
            console.log("初始化開始...");
            document.getElementById('loading-screen').style.display = 'flex';
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                members = data.f_members || [];
                flowers = data.f_data || [];
                competitions = data.f_comps || [];
                renderFlowers(); renderMembers(); renderRecords();
                console.log("資料加載成功");
            } catch (e) {
                console.error("載入出錯:", e);
                alert("連線失敗，請檢查網址或權限。");
            }
            document.getElementById('loading-screen').style.display = 'none';
        }

// 加上 bypass 參數，預設為 false
async function saveData(bypass = false) {
    if (!isAdmin && !bypass) return;

    const payload = {
        action: 'updateAll',
        f_members: members,
        f_data: flowers,
        f_comps: competitions
    };

    document.getElementById('loading-screen').style.display = 'flex';

    // 改用 Google 官方的高速傳輸方式
    google.script.run
        .withSuccessHandler(function(res) {
            document.getElementById('loading-screen').style.display = 'none';
            alert("同步成功！");
        })
        .withFailureHandler(function(err) {
            document.getElementById('loading-screen').style.display = 'none';
            alert("儲存失敗：" + err);
        })
        .doPost({postData: {contents: JSON.stringify(payload)}}); 
        // 註：這行是為了模擬 e.postData，如果直接呼叫後端函數會更穩
}
        function renderMembers() {
            const q = (document.getElementById('member-search').value || "").toLowerCase();
            const grid = document.getElementById('member-card-grid');
            const filtered = members.filter(m => m.name.toLowerCase().includes(q) || (m.gameId && m.gameId.toString().includes(q)));
            grid.innerHTML = filtered.map(m => `
                    <div class="member-card" onclick="showMemberCard('${m.id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${m.name}</strong>
                                <div style="color:#888; font-size:12px;">ID: ${m.gameId || '-'}</div>
                            </div>
                            <button onclick="event.stopPropagation(); showAddMember('${m.id}')" style="background:#007bff; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:12px;">編輯</button>
                        </div>
                    </div>`).join('');
        }

        function showMemberCard(id) {
            const m = members.find(x => x.id.toString() === id.toString());
            const ownedArray = m.ownedFlowers || [];
            const flowerHTML = ownedArray.map(fid => {
                const f = flowers.find(x => x.id.toString() === fid.toString());
                return f ? `<span class="grade-${f.grade}">● ${f.name}</span> ` : '';
            }).join('');
            document.getElementById('modal-body').innerHTML = `<h2>${m.name}</h2><p>ID: ${m.gameId}</p><div>${flowerHTML}</div>`;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function showAddMember(memberId = null) {
            window.editingMemberId = memberId;
            const m = memberId ? members.find(x => x.id.toString() === memberId.toString()) : { name: '', gameId: '', ownedFlowers: [] };
            document.getElementById('modal-body').innerHTML = `
                    <h3>${memberId ? '編輯' : '新增'}成員</h3>
                    <div class="form-group"><label>名稱</label><input type="text" id="m-name" value="${m.name}"></div>
                    <div class="form-group"><label>遊戲ID</label><input type="text" id="m-gameid" value="${m.gameId}"></div>
                    <div id="m-flower-list" style="max-height:200px; overflow-y:auto; border:1px solid #eee; padding:5px;">
                        ${flowers.map(f => `<label style="display:block;"><input type="checkbox" name="m-flower-check" value="${f.id}" ${m.ownedFlowers.includes(f.id.toString()) ? 'checked' : ''}> ${f.name}</label>`).join('')}
                    </div>
                    <button class="add-btn" style="width:100%; margin-top:10px;" onclick="saveMemberData()">儲存</button>`;
            document.getElementById('main-modal').style.display = 'flex';
        }

async function saveMemberData() {
    const name = document.getElementById('m-name').value;
    if (!name) { alert("請輸入名稱"); return; }

    const checks = document.querySelectorAll('input[name="m-flower-check"]:checked');
    const data = { 
        id: window.editingMemberId || Date.now().toString(), 
        name, 
        gameId: document.getElementById('m-gameid').value, 
        ownedFlowers: Array.from(checks).map(c => c.value) 
    };

    if (window.editingMemberId) {
        members[members.findIndex(x => x.id.toString() === window.editingMemberId.toString())] = data;
    } else {
        members.push(data);
    }

    renderMembers();
    closeModal();
    // 關鍵：呼叫 saveData 時傳入 true，繞過管理員檢查
    await saveData(true); 
}

        function renderFlowers() {
            const q = document.getElementById('flower-search').value.toLowerCase();
            const grid = document.getElementById('flower-grid');
            grid.innerHTML = flowers.filter(f => f.name.toLowerCase().includes(q))
                .map(f => `<div class="flower-card" onclick="showFlowerDetail('${f.id}')"><img src="${f.image || 'https://via.placeholder.com/150'}"><div class="name grade-${f.grade}">${f.name}</div></div>`).join('');
        }

        function showFlowerDetail(id) {
            const f = flowers.find(x => x.id.toString() === id.toString());
            if (!f) return;

            // --- 新增：搜尋擁有此花的人 ---
            const owners = members.filter(m =>
                m.ownedFlowers && m.ownedFlowers.map(String).includes(id.toString())
            );

            const ownerListHTML = owners.length > 0
                ? owners.map(m => `<span style="background:#eee; padding:2px 8px; border-radius:10px; margin:2px; display:inline-block; font-size:12px;">${m.name}</span>`).join('')
                : '<span style="color:#999; font-size:12px;">目前無人擁有</span>';
            // ----------------------------

            document.getElementById('modal-body').innerHTML = `
        <div style="text-align:center;">
            <h2 class="grade-${f.grade}">${f.name}</h2>
            <img src="${f.image || 'https://via.placeholder.com/150'}" style="width:100%; border-radius:8px; margin-bottom:10px;">
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; text-align:left; margin-bottom:10px;">
                <p><b>品級：</b><span class="grade-${f.grade}">${f.grade}</span></p>
                <p><b>分數：</b>${f.score} 分</p>
                <p><b>擁有者：</b></p>
                <div style="margin-top:5px;">${ownerListHTML}</div>
            </div>
            ${isAdmin ? `<button onclick="openFlowerModal('${f.id}')" style="margin-top:10px; padding:8px 16px;">編輯花朵</button>` : ''}
        </div>
    `;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function openFlowerModal(editId = null) {
            const f = editId ? flowers.find(x => x.id.toString() === editId.toString()) : null;
            document.getElementById('modal-body').innerHTML = `<h3>花朵設定</h3><div class="form-group"><label>名稱</label><input type="text" id="f-name" value="${f ? f.name : ''}"></div><div class="form-group"><label>分數</label><input type="number" id="f-score" value="${f ? f.score : ''}"></div><div class="form-group"><label>品級</label><select id="f-grade"><option value="仙品">仙品</option><option value="華品">華品</option><option value="珍品">珍品</option><option value="普品">普品</option><option value="凡品">凡品</option></select></div><div class="form-group"><label>照片</label><input type="file" id="f-img" accept="image/*"></div><button class="add-btn" onclick="saveFlower('${editId}')">儲存</button>`;
            if (f) document.getElementById('f-grade').value = f.grade;
            document.getElementById('main-modal').style.display = 'flex';
        }

async function saveFlower(editId) {
    const fileInput = document.getElementById('f-img');
    const file = fileInput ? fileInput.files[0] : null;
    
    let imgData = (editId !== 'null' && editId !== null) 
        ? flowers.find(x => x.id.toString() === editId.toString()).image 
        : "";

    // 如果有選新檔案，轉換成 Base64
    if (file) {
        imgData = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    const data = {
        id: (editId !== 'null' && editId !== null) ? editId : Date.now().toString(),
        name: document.getElementById('f-name').value,
        grade: document.getElementById('f-grade').value,
        score: document.getElementById('f-score').value,
        image: imgData // 這裡如果是新圖片，會是 data:image/jpeg;base64...
    };

    if (editId !== 'null' && editId !== null) {
        const idx = flowers.findIndex(x => x.id.toString() === editId.toString());
        flowers[idx] = data;
    } else {
        flowers.push(data);
    }

    renderFlowers();
    closeModal();
    await saveData(); // 這裡會觸發 fetch POST
}

        function renderRecords() {
            const nameQ = document.getElementById('r-search-name').value.toLowerCase();
            const flowerQ = document.getElementById('r-search-flower').value.toLowerCase();
            const body = document.getElementById('r-list-body');
            const filtered = competitions.filter(r => (r.memberName || "").toLowerCase().includes(nameQ) && (r.flowerNames || "").toLowerCase().includes(flowerQ));
            body.innerHTML = filtered.map(r => `<tr><td>${r.memberName}</td><td>${r.flowerNames}</td><td><span class="grade-${r.maxGrade}">${r.maxGrade}</span></td><td><button onclick="editRecord('${r.id}')">改</button></td></tr>`).join('');
        }

        function showAddRecord() {
            const sel = document.getElementById('r-member-select');
            sel.innerHTML = '<option value="">-- 請選擇 --</option>' + members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            document.getElementById('record-modal').style.display = 'flex';
        }

        function loadMemberFlowersForRecord(preSelected = []) {
            const mid = document.getElementById('r-member-select').value;
            const area = document.getElementById('r-flower-pick-area');
            const m = members.find(x => x.id.toString() === mid.toString());
            if (!m) return;
            area.innerHTML = (m.ownedFlowers || []).map(fid => {
                const f = flowers.find(x => x.id.toString() === fid.toString());
                return f ? `<label style="display:block;"><input type="checkbox" name="r-flower-check" value="${f.grade}" data-fname="${f.name}" ${preSelected.includes(f.name) ? 'checked' : ''}> ${f.name}</label>` : '';
            }).join('');
        }

        async function saveRecord() {
            const mid = document.getElementById('r-member-select').value;
            const checks = document.querySelectorAll('input[name="r-flower-check"]:checked');
            const m = members.find(x => x.id.toString() === mid);
            const names = Array.from(checks).map(c => c.getAttribute('data-fname'));
            const grades = Array.from(checks).map(c => c.value);
            const order = { "仙品": 1, "華品": 2, "珍品": 3, "普品": 4, "凡品": 5 };
            const max = grades.reduce((a, b) => order[a] < order[b] ? a : b, "凡品");
            const data = { id: window.editingRecordId || Date.now().toString(), memberId: mid, memberName: m.name, maxGrade: max, flowerNames: names.join(', ') };
            if (window.editingRecordId) competitions[competitions.findIndex(x => x.id.toString() === window.editingRecordId)] = data; else competitions.push(data);
            renderRecords(); closeRecordModal(); await saveData();
        }

        function editRecord(id) {
            window.editingRecordId = id;
            const r = competitions.find(x => x.id.toString() === id.toString());
            document.getElementById('r-member-select').value = r.memberId;
            loadMemberFlowersForRecord(r.flowerNames.split(', '));
            document.getElementById('record-modal').style.display = 'flex';
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('btn-' + p).classList.add('active');
        }
        function closeModal() { document.getElementById('main-modal').style.display = 'none'; }
        function closeRecordModal() { document.getElementById('record-modal').style.display = 'none'; }
        function openLoginModal() {
            if (isAdmin) { isAdmin = false; updateAdminUI(); return; }
            const p = prompt("密碼"); if (p == '45678') { isAdmin = true; updateAdminUI(); }
        }
        function updateAdminUI() {
            document.getElementById('admin-tag').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('login-btn').innerText = isAdmin ? '管理員登出' : '管理員登入';
            renderMembers(); renderFlowers();
        }

        init(); // 啟動
    </script>
</body>
</html>
