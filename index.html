<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寒宮</title>
    <style>
        :root {
            --red: #ff4d4d;
            --orange: #ffa500;
            --purple: #a020f0;
            --blue: #1e90ff;
            --green: #32cd32;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --admin-color: #d9534f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

            nav button {
                padding: 8px 12px;
                border: none;
                background: #eee;
                cursor: pointer;
                border-radius: 5px;
                font-weight: bold;
                font-size: 14px;
            }

                nav button.active {
                    background: #333;
                    color: white;
                }

        .admin-badge {
            background: var(--admin-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            margin-right: 10px;
        }

        .page {
            display: none;
        }

            .page.active {
                display: block;
            }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button.add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .member-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #666;
            cursor: pointer;
        }

        .flower-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .flower-card {
            background: var(--card-bg);
            padding: 5px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            .flower-card img {
                width: 100%;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                border-radius: 4px;
            }

            .flower-card .name {
                font-size: 13px;
                margin-top: 4px;
                font-weight: bold;
                width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

        .grade-仙品 {
            color: var(--red);
        }

        .grade-華品 {
            color: var(--orange);
        }

        .grade-珍品 {
            color: var(--purple);
        }

        .grade-普品 {
            color: var(--blue);
        }

        .grade-凡品 {
            color: var(--green);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #eee;
            padding: 10px 8px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            right: 15px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 10px;
        }

            .form-group label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            .form-group input, .form-group select {
                width: 100%;
                box-sizing: border-box;
            }

        @media screen and (max-width: 600px) {
            th, td {
                padding: 5px 2px;
                font-size: 11px;
            }

            .controls input {
                width: 46%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#555;">正在同步雲端...</p>
    </div>

    <header>
        <nav>
            <button onclick="showPage('members')" id="btn-members" class="active">成員資料</button>
            <button onclick="showPage('flowers')" id="btn-flowers">花朵清單</button>
            <button onclick="showPage('competitions')" id="btn-competitions">競賽清單</button>
        </nav>
        <div>
            <span id="admin-tag" class="admin-badge">管理員模式</span>
            <button id="login-btn" onclick="openLoginModal()" style="padding: 5px 10px;">管理員登入</button>
        </div>
    </header>

    <div id="page-members" class="page active">
        <div class="controls">
            <input type="text" id="member-search" placeholder="搜尋名稱/ID..." oninput="renderMembers()">
            <button class="add-btn" onclick="showAddMember()">+ 新增成員</button>
        </div>
        <div id="member-card-grid" class="member-grid"></div>
    </div>

    <div id="page-flowers" class="page">
        <div class="controls">
            <input type="text" id="flower-search" placeholder="搜尋花朵..." oninput="renderFlowers()">
            <button class="add-btn" onclick="openFlowerModal()">+ 新增花朵</button>
        </div>
        <div id="flower-grid" class="flower-grid"></div>
    </div>

    <div id="page-competitions" class="page">
        <div class="controls">
            <input type="text" id="r-search-name" placeholder="🔍 搜尋成員名稱..." oninput="renderRecords()">
            <input type="text" id="r-search-flower" placeholder="🌸 搜尋參賽花朵..." oninput="renderRecords()">
            <button class="add-btn" onclick="showAddRecord()">+ 新增紀錄</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>成員名稱</th>
                        <th>參賽花朵</th>
                        <th style="width: 100px;">管理</th>
                    </tr>
                </thead>
                <tbody id="r-list-body"></tbody>
            </table>
        </div>
    </div>

    <div id="main-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="record-modal" class="modal" onclick="closeRecordModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeRecordModal()">&times;</span>
            <h3>競賽紀錄資料</h3>
            <div class="form-group">
                <label>選擇成員</label>
                <select id="r-member-select" onchange="loadMemberFlowersForRecord()" style="width:100%;">
                    <option value="">-- 請選擇成員 --</option>
                </select>
            </div>
            <div class="form-group">
                <label>勾選本次參賽花朵</label>
                <div id="r-flower-pick-area" style="max-height:250px; overflow-y:auto; border:1px solid #ddd; padding:10px; border-radius:4px;">
                    請先選擇成員...
                </div>
            </div>
            <button class="add-btn" onclick="saveRecord()" style="width:100%; margin-top:10px;">儲存紀錄</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRT5D4-LQBjocV9ps9Ey2SiI89spFIJhBWQLbGrKK5ecb-wf6bqa-rwcVRz81BOyga/exec";
        let members = [];
        let flowers = [];
        let competitions = [];
        let isAdmin = false;

        async function init() {
            console.log("初始化開始...");
            document.getElementById('loading-screen').style.display = 'flex';
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                members = data.f_members || [];
                flowers = data.f_data || [];
                competitions = data.f_comps || [];
                renderFlowers(); renderMembers(); renderRecords();
                console.log("資料加載成功");
            } catch (e) {
                console.error("載入出錯:", e);
                alert("連線失敗，請檢查網址或權限。");
            }
            document.getElementById('loading-screen').style.display = 'none';
        }

async function saveData(bypass = false) {
    // 讓普通成員也能同步，只要呼叫 saveData(true) 即可
    if (!isAdmin && !bypass) return; 

    document.getElementById('loading-screen').style.display = 'flex';
    
    // 修正點：將右邊的 f_comps 改成 competitions
    const payload = {
        action: 'updateAll',
        f_members: members,
        f_data: flowers,
        f_comps: competitions // 👈 這裡原本寫錯了，一定要改回 competitions
    };

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        });

        // 給 Google 點時間處理資料
        await new Promise(resolve => setTimeout(resolve, 2500));
        
        // 重新載入最新資料確保同步成功
        await init(); 
        alert("同步成功！");
    } catch (e) {
        console.error("同步出錯:", e);
        alert("同步失敗，請檢查網路。");
    } finally {
        document.getElementById('loading-screen').style.display = 'none';
    }
}
        const GRADE_ORDER = { '仙品': 1, '華品': 2, '珍品': 3, '普品': 4, '凡品': 5 };
        // 刪除原本重複的 GRADE_WEIGHT，統一使用 GRADE_ORDER
function renderMembers() {
    const q = (document.getElementById('member-search').value || "").toLowerCase();
    const grid = document.getElementById('member-card-grid');
    const filtered = members.filter(m => m.name.toLowerCase().includes(q) || (m.gameId && m.gameId.toString().includes(q)));
    
    grid.innerHTML = filtered.map(m => `
        <div class="member-card" onclick="showMemberCard('${m.id}')">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong>${m.name}</strong>
                    <div style="color:#888; font-size:12px;">ID: ${m.gameId || '-'}</div>
                </div>
                <div>
                    <button onclick="event.stopPropagation(); showAddMember('${m.id}')" style="background:#007bff; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:12px; cursor:pointer;">編輯</button>
                    ${isAdmin ? `<button onclick="event.stopPropagation(); deleteMember('${m.id}')" style="background:#d9534f; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:12px; margin-left:5px; cursor:pointer;">刪除</button>` : ''}
                </div>
            </div>
        </div>`).join('');
}

// 刪除成員的邏輯
async function deleteMember(id) {
    const m = members.find(x => x.id.toString() === id.toString());
    if (!confirm(`確定要刪除成員「${m.name}」嗎？這將無法復原。`)) return;

    members = members.filter(x => x.id.toString() !== id.toString());
    
    renderMembers(); // 立即更新畫面
    await saveData(); // 同步到雲端
}

        function showMemberCard(id) {
            const m = members.find(x => x.id.toString() === id.toString());
            if (!m) return;

            const ownedIds = m.ownedFlowers || [];
            const flowerHTML = ownedIds.map(fid => {
                // 根據 ID 查找花朵物件
                const f = flowers.find(x => x.id.toString() === fid.toString());
                return f ? `<span class="grade-${f.grade}" style="margin-right:10px; display:inline-block;">● ${f.name}</span>` : '';
            }).join('');

            document.getElementById('modal-body').innerHTML = `
        <h2 style="margin-bottom:5px;">${m.name}</h2>
        <p style="color:#888;">遊戲 ID: ${m.gameId || '-'}</p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <div style="text-align:left;">
            <p><b>擁有花朵：</b></p>
            <div style="line-height:1.8;">${flowerHTML || '<span style="color:#ccc;">尚無花朵</span>'}</div>
        </div>
    `;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function showAddMember(id = null) {
            const m = id ? members.find(x => x.id.toString() === id.toString()) : null;
            const isEdit = !!m;
            window.editingMemberId = id; // 記錄目前正在編輯的 ID

            const modalBody = document.getElementById('modal-body');

            // 取得已擁有的花朵 (相容舊格式)
            const ownedFlowers = isEdit ? (m.ownedFlowers || []) : [];

            modalBody.innerHTML = `
        <h3>${isEdit ? '編輯' : '新增'}成員資料</h3>
        <div class="form-group">
            <label>成員名稱 *</label>
            <input type="text" id="m-name" value="${isEdit ? m.name : ''}" placeholder="輸入成員名稱">
        </div>
        <div class="form-group">
            <label>遊戲 ID</label>
            <input type="text" id="m-gameid" value="${isEdit ? (m.gameId || '') : ''}" placeholder="輸入遊戲 ID">
        </div>
        
        <div class="form-group" style="margin-top: 20px;">
            <label>管理擁有花朵 (依等級排序)</label>
            <div style="display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap;">
                <input type="text" id="m-flower-search" placeholder="🔍 搜尋花朵或等級..." style="flex:1; min-width: 150px;" oninput="filterMemberFlowers()">
                <button type="button" class="add-btn" style="background:#6c757d; padding:5px 10px;" onclick="bulkSelect(true)">全選</button>
                <button type="button" class="add-btn" style="background:#6c757d; padding:5px 10px;" onclick="bulkSelect(false)">取消</button>
            </div>
            
            <div id="m-flower-list" style="max-height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 8px; background: #fafafa;">
                ${generateFlowerCheckboxes(ownedFlowers)}
            </div>
        </div>
        
        <button class="add-btn" onclick="saveMember()" style="width:100%; margin-top:15px; padding: 12px;">確認儲存資料</button>
    `;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function generateFlowerCheckboxes(ownedList = []) {
            if (!flowers || flowers.length === 0) return '<p style="color:#999;">目前沒有花朵資料</p>';

            // 依等級排序
            const sortedFlowers = [...flowers].sort((a, b) => {
                return (GRADE_ORDER[a.grade] || 99) - (GRADE_ORDER[b.grade] || 99);
            });

            return sortedFlowers.map(f => {
                // 核心修正：比對 ID (ownedList 現在存的是 ID 陣列)
                const isChecked = ownedList.map(String).includes(f.id.toString()) ? 'checked' : '';

                return `
            <div class="m-flower-item" data-name="${f.name.toLowerCase()} ${f.grade}">
                <label style="display: flex; align-items: center; padding: 6px 0; cursor: pointer; border-bottom: 1px solid #eee;">
                    <input type="checkbox" class="m-flower-cb" value="${f.id}" ${isChecked} style="width:18px; height:18px; margin-right:10px;">
                    <span class="grade-${f.grade}" style="font-weight:bold; min-width: 50px;">[${f.grade}]</span>
                    <span style="color: #333;">${f.name}</span>
                </label>
            </div>
        `;
            }).join('');
        }

async function saveMember() {
    const name = document.getElementById('m-name').value;
    if (!name) { alert("請輸入名稱"); return; }

    const checks = document.querySelectorAll('.m-flower-cb:checked');
    const selectedFlowers = Array.from(checks).map(c => c.value);

    const data = {
        id: window.editingMemberId || Date.now().toString(),
        name: name,
        gameId: document.getElementById('m-gameid').value,
        ownedFlowers: selectedFlowers
    };

    if (window.editingMemberId) {
        const idx = members.findIndex(x => x.id.toString() === window.editingMemberId.toString());
        if (idx !== -1) members[idx] = data;
    } else {
        members.push(data);
    }

    renderMembers();
    closeModal();

    // 這裡同樣要傳 true
    await saveData(true);
}

        function renderFlowers() {
            const term = document.getElementById('flower-search').value.toLowerCase();
            const grid = document.getElementById('flower-grid');

            const sortedFlowers = [...flowers].sort((a, b) => {
                return (GRADE_ORDER[a.grade] || 99) - (GRADE_ORDER[b.grade] || 99);
            });

            const filtered = sortedFlowers.filter(f => f.name.toLowerCase().includes(term));

            grid.innerHTML = filtered.map(f => `
        <div class="flower-card" onclick="showFlowerDetail('${f.id}')">
            <img src="${f.image || 'https://via.placeholder.com/100'}" alt="${f.name}">
            <div class="name grade-${f.grade}">${f.name}</div>
            <div style="font-size:10px; color:#888;">${f.grade}</div>
        </div>
    `).join('');
        }

        function showFlowerDetail(id) {
            const f = flowers.find(x => x.id.toString() === id.toString());
            if (!f) return;

            // --- 新增：搜尋擁有此花的人 ---
            const owners = members.filter(m =>
                m.ownedFlowers && m.ownedFlowers.map(String).includes(id.toString())
            );

            const ownerListHTML = owners.length > 0
                ? owners.map(m => `<span style="background:#eee; padding:2px 8px; border-radius:10px; margin:2px; display:inline-block; font-size:12px;">${m.name}</span>`).join('')
                : '<span style="color:#999; font-size:12px;">目前無人擁有</span>';
            // ----------------------------

            document.getElementById('modal-body').innerHTML = `
            <div style="text-align:center;">
                <h2 class="grade-${f.grade}">${f.name}</h2>
                <img src="${f.image || 'https://via.placeholder.com/150'}" style="width:100%; border-radius:8px; margin-bottom:10px;">
                <div style="background:#f9f9f9; padding:10px; border-radius:8px; text-align:left; margin-bottom:10px;">
                    <p><b>品級：</b><span class="grade-${f.grade}">${f.grade}</span></p>
                    <p><b>分數：</b>${f.score} 分</p>
                    <p><b>擁有者：</b></p>
                    <div style="margin-top:5px;">${ownerListHTML}</div>
                </div>
                ${isAdmin ? `<button onclick="openFlowerModal('${f.id}')" style="margin-top:10px; padding:8px 16px;">編輯花朵</button>` : ''}
            </div>
        `;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function openFlowerModal(editId = null) {
            const f = editId ? flowers.find(x => x.id.toString() === editId.toString()) : null;
            document.getElementById('modal-body').innerHTML = `<h3>花朵設定</h3><div class="form-group"><label>名稱</label><input type="text" id="f-name" value="${f ? f.name : ''}"></div><div class="form-group"><label>分數</label><input type="number" id="f-score" value="${f ? f.score : ''}"></div><div class="form-group"><label>品級</label><select id="f-grade"><option value="仙品">仙品</option><option value="華品">華品</option><option value="珍品">珍品</option><option value="普品">普品</option><option value="凡品">凡品</option></select></div><div class="form-group"><label>照片</label><input type="file" id="f-img" accept="image/*"></div><button class="add-btn" onclick="saveFlower('${editId}')">儲存</button>`;
            if (f) document.getElementById('f-grade').value = f.grade;
            document.getElementById('main-modal').style.display = 'flex';
        }

        async function saveFlower(editId) {
            // 取得圖片檔案
            const file = document.getElementById('f-img').files[0];
            let base64 = "";

            // 處理圖片：有選新圖就壓縮，沒選新圖就保留舊的
            if (file) {
                base64 = await compressImage(file, 400, 0.6);
            } else if (editId && editId !== 'null') {
                const oldFlower = flowers.find(x => x.id.toString() === editId.toString());
                base64 = oldFlower ? oldFlower.image : "";
            }

            // 構建花朵資料 (乾淨版)
            const data = {
                id: (editId && editId !== 'null') ? editId : Date.now().toString(),
                name: document.getElementById('f-name').value,
                grade: document.getElementById('f-grade').value,
                score: parseInt(document.getElementById('f-score').value) || 0,
                image: base64
            };

            if (editId && editId !== 'null') {
                const idx = flowers.findIndex(x => x.id.toString() === editId.toString());
                if (idx !== -1) flowers[idx] = data;
            } else {
                flowers.push(data);
            }

            renderFlowers(); // 立即更新畫面
            closeModal();    // 關閉視窗

            await saveData(); // 執行同步至雲端
        }
        function renderMemberFlowerItems(ownedList = []) {
            // 同樣依照等級排序
            const sorted = [...flowers].sort((a, b) => (GRADE_ORDER[a.grade] || 99) - (GRADE_ORDER[b.grade] || 99));

            return sorted.map(f => {
                const checked = ownedList.includes(f.name) ? 'checked' : '';
                return `
            <div class="flower-item-row" data-name="${f.name.toLowerCase()}">
                <label style="display:flex; align-items:center; gap:8px; padding:4px; cursor:pointer;">
                    <input type="checkbox" class="flower-check" value="${f.name}" ${checked}>
                    <span class="grade-${f.grade}" style="font-size:14px;">●</span>
                    <span>${f.name}</span>
                    <small style="color:#999; margin-left:auto;">${f.grade}</small>
                </label>
            </div>
        `;
            }).join('');
        }

        // 5. 搜尋過濾功能
        function filterMemberFlowers() {
            const term = document.getElementById('m-flower-search').value.toLowerCase();
            const items = document.querySelectorAll('.m-flower-item');
            items.forEach(item => {
                const name = item.getAttribute('data-name');
                // 搜尋同時支援名稱與等級
                item.style.display = name.includes(term) ? 'block' : 'none';
            });
        }

        /**
         * 全選/取消全選 (僅影響目前搜尋到的結果)
         */
        function bulkSelect(checkAll) {
            const items = document.querySelectorAll('.m-flower-item');
            items.forEach(item => {
                // 關鍵：只勾選目前「看得見」的項目
                if (item.style.display !== 'none') {
                    const cb = item.querySelector('.m-flower-cb');
                    if (cb) cb.checked = checkAll;
                }
            });
        }

function renderRecords() {
    const nameQ = document.getElementById('r-search-name').value.toLowerCase();
    const flowerQ = document.getElementById('r-search-flower').value.toLowerCase();
    const body = document.getElementById('r-list-body');
    
    const filtered = competitions.filter(r => 
        (r.memberName || "").toLowerCase().includes(nameQ) && 
        (r.flowerNames || "").toLowerCase().includes(flowerQ)
    );

    body.innerHTML = filtered.map(r => `
        <tr>
            <td>${r.memberName}</td>
            <td><small>${r.flowerNames}</small></td>
            <td><span class="grade-${r.maxGrade}">${r.maxGrade}</span></td>
            <td>
                <button onclick="editRecord('${r.id}')" style="padding:2px 5px;">改</button>
                ${isAdmin ? `<button onclick="deleteRecord('${r.id}')" style="background:#d9534f; color:white; border:none; padding:2px 5px; margin-left:5px; border-radius:3px; cursor:pointer;">刪</button>` : ''}
            </td>
        </tr>
    `).join('');
}
        // 刪除紀錄的邏輯
async function deleteRecord(id) {
    if (!confirm("確定要刪除這筆競賽紀錄嗎？")) return;
    
    // 過濾掉該 ID
    competitions = competitions.filter(x => x.id.toString() !== id.toString());
    
    renderRecords(); // 立即更新畫面
    await saveData(); // 同步到雲端
}
        
function showAddRecord() {
    window.editingRecordId = null; // 👈 這一行最重要，防止覆蓋舊資料
    
    const sel = document.getElementById('r-member-select');
    sel.innerHTML = '<option value="">-- 請選擇 --</option>' + 
        members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
    
    document.getElementById('r-flower-pick-area').innerHTML = '請先選擇成員...';
    document.getElementById('record-modal').style.display = 'flex';
}

        function loadMemberFlowersForRecord(preSelectedNames = []) {
            const mid = document.getElementById('r-member-select').value;
            const area = document.getElementById('r-flower-pick-area');
            const m = members.find(x => x.id.toString() === mid.toString());

            if (!m || !m.ownedFlowers || m.ownedFlowers.length === 0) {
                area.innerHTML = '<p style="color:#999; font-size:13px;">該成員目前沒有登記任何花朵。</p>';
                return;
            }

            area.innerHTML = m.ownedFlowers.map(fid => {
                const f = flowers.find(x => x.id.toString() === fid.toString());
                if (!f) return '';

                // 這裡維持用名稱比對 preSelectedNames 是為了相容你現有的紀錄格式
                const isChecked = preSelectedNames.includes(f.name) ? 'checked' : '';

                return `
            <label style="display:block; padding:5px 0; border-bottom:1px solid #f9f9f9; cursor:pointer;">
                <input type="checkbox" name="r-flower-check" value="${f.grade}" data-fname="${f.name}" ${isChecked}> 
                <span class="grade-${f.grade}">[${f.grade}]</span> ${f.name}
            </label>
        `;
            }).join('');
        }

async function saveRecord() {
    const mid = document.getElementById('r-member-select').value;
    const checks = document.querySelectorAll('input[name="r-flower-check"]:checked');
    
    if (!mid) { alert("請選擇成員"); return; }
    if (checks.length === 0) { alert("請至少勾選一朵花"); return; }

    const m = members.find(x => x.id.toString() === mid);
    const names = Array.from(checks).map(c => c.getAttribute('data-fname'));
    const grades = Array.from(checks).map(c => c.value);
    
    const order = { "仙品": 1, "華品": 2, "珍品": 3, "普品": 4, "凡品": 5 };
    const max = grades.reduce((a, b) => order[a] < order[b] ? a : b, "凡品");

    const data = { 
        id: window.editingRecordId || Date.now().toString(), 
        memberId: mid, 
        memberName: m.name, 
        maxGrade: max, 
        flowerNames: names.join(', ') 
    };

    // 檢查是「更新舊紀錄」還是「新增新紀錄」
    if (window.editingRecordId) {
        const idx = competitions.findIndex(x => x.id.toString() === window.editingRecordId.toString());
        if (idx !== -1) competitions[idx] = data;
    } else {
        competitions.push(data);
    }

    renderRecords();
    closeRecordModal();
    window.editingRecordId = null; 
    
    // 關鍵修正：傳入 true，讓普通成員也能同步這筆紀錄
    await saveData(true); 
}
// 這裡刪除了原本多出的多餘括號與重複程式碼

        function editRecord(id) {
            window.editingRecordId = id;
            const r = competitions.find(x => x.id.toString() === id.toString());
            document.getElementById('r-member-select').value = r.memberId;
            loadMemberFlowersForRecord(r.flowerNames.split(', '));
            document.getElementById('record-modal').style.display = 'flex';
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('btn-' + p).classList.add('active');
        }
        function closeModal() { document.getElementById('main-modal').style.display = 'none'; }
        function closeRecordModal() { document.getElementById('record-modal').style.display = 'none'; }
        function openLoginModal() {
            if (isAdmin) { isAdmin = false; updateAdminUI(); return; }
            const p = prompt("密碼"); if (p == '45678') { isAdmin = true; updateAdminUI(); }
        }
        function updateAdminUI() {
            document.getElementById('admin-tag').style.display = isAdmin ? 'inline-block' : 'none';
            document.getElementById('login-btn').innerText = isAdmin ? '管理員登出' : '管理員登入';
            renderMembers(); renderFlowers();
        }
        // 圖片壓縮函式
        function compressImage(file, maxWidth = 400, quality = 0.6) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height *= maxWidth / width));
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        // 壓縮為 JPEG，避免 PNG 過大
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }
        init(); // 啟動
    </script>
</body>
