<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣寒宮</title>
    <style>
        :root {
            --red: #ff4d4d;
            --orange: #ffa500;
            --purple: #a020f0;
            --blue: #1e90ff;
            --green: #32cd32;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --admin-color: #d9534f;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

            nav button {
                padding: 8px 12px;
                border: none;
                background: #eee;
                cursor: pointer;
                border-radius: 5px;
                font-weight: bold;
                font-size: 14px;
            }

                nav button.active {
                    background: #333;
                    color: white;
                }

        .admin-badge {
            background: var(--admin-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            margin-right: 10px;
        }

        .page {
            display: none;
        }

            .page.active {
                display: block;
            }

        .controls {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select, textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        button.add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .member-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #666;
            cursor: pointer;
        }

.flower-grid {
    display: grid;
    /* 手機版 3 欄，平板以上自動填充 */
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px;
    margin-top: 10px;
}

.flower-card {
    background: var(--card-bg);
    padding: 8px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    text-align: center;
}

.flower-card img { 
            width: 100%; 
            aspect-ratio: 1 / 1; /* 強制寬高比 1:1 (正方形) */
            object-fit: cover;    /* 裁切填滿容器，防止圖片拉伸變形 */
            border-radius: 4px; 
            display: block; 
            background: #f0f0f0; /* 預載底色 */
        }

.flower-card .name { font-size: 12px; font-weight: bold; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .grade-仙品 { color: var(--red); }
        .grade-華品 { color: var(--orange); }
        .grade-珍品 { color: var(--purple); }
        .grade-普品 { color: var(--blue); }
        .grade-凡品 { color: var(--green); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 14px; }
        th, td { border: 1px solid #eee; padding: 10px 8px; text-align: left; }
        th { background: #f8f9fa; }

        .grade-仙品 {
            color: var(--red);
        }

        .grade-華品 {
            color: var(--orange);
        }

        .grade-珍品 {
            color: var(--purple);
        }

        .grade-普品 {
            color: var(--blue);
        }

        .grade-凡品 {
            color: var(--green);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            font-size: 14px;
        }

        th, td {
            border: 1px solid #eee;
            padding: 10px 8px;
            text-align: left;
        }

        th {
            background: #f8f9fa;
        }

@media screen and (min-width: 768px) {
.flower-grid { 
            display: grid; 
            /* 手機版強制 3 欄，平板以上自動填充 */
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-top: 10px; 
        }
    /* 彈窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 450px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:15px; color:#555;">正在同步雲端...</p>
    </div>

    <header>
        <nav>
            <button onclick="showPage('members')" id="btn-members" class="active">成員資料</button>
            <button onclick="showPage('flowers')" id="btn-flowers">花朵清單</button>
            <button onclick="showPage('competitions')" id="btn-competitions">競賽清單</button>
        </nav>
        <div>
            <span id="admin-tag" class="admin-badge">管理員模式</span>
            <button id="login-btn" onclick="openLoginModal()" style="padding: 5px 10px;">管理員登入</button>
        </div>
    </header>

    <div id="page-members" class="page active">
        <div class="controls">
            <input type="text" id="member-search" placeholder="搜尋名稱/ID..." oninput="renderMembers()">
            <button class="add-btn" onclick="showAddMember()">+ 新增成員</button>
        </div>
        <div id="member-card-grid" class="member-grid"></div>
    </div>

    <div id="page-flowers" class="page">
        <div class="controls">
            <input type="text" id="flower-search" placeholder="搜尋花朵..." oninput="renderFlowers()">
            <button class="add-btn" onclick="openFlowerModal()">+ 新增花朵</button>
        </div>
        <div id="flower-grid" class="flower-grid"></div>
    </div>

    <div id="page-competitions" class="page">
        <div class="controls">
            <input type="text" id="r-search-name" placeholder="🔍 搜尋成員名稱..." oninput="renderRecords()">
            <input type="text" id="r-search-flower" placeholder="🌸 搜尋參賽花朵..." oninput="renderRecords()">
            <button class="add-btn" onclick="showAddRecord()">+ 新增紀錄</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>成員名稱</th>
                        <th>參賽花朵</th>
                        <th style="width: 100px;">管理</th>
                    </tr>
                </thead>
                <tbody id="r-list-body"></tbody>
            </table>
        </div>
    </div>

    <div id="main-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRT5D4-LQBjocV9ps9Ey2SiI89spFIJhBWQLbGrKK5ecb-wf6bqa-rwcVRz81BOyga/exec";
        let members = [];
        let flowers = [];
        let competitions = [];
        let isAdmin = false;

        async function init() {
            console.log("初始化開始...");
            document.getElementById('loading-screen').style.display = 'flex';
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                members = data.f_members || [];
                flowers = data.f_data || [];
                competitions = data.f_comps || [];
                renderFlowers(); renderMembers(); renderRecords();
                console.log("資料加載成功");
            } catch (e) {
                console.error("載入出錯:", e);
                alert("連線失敗，請檢查網址或權限。");
            }
            document.getElementById('loading-screen').style.display = 'none';
        }
// 統一呼叫名稱
function showAddMember(id=null) { openMemberModal(id); }
async function saveData(bypass = false) {
    if (!isAdmin && !bypass) {
        console.warn("非管理員身分，取消儲存");
        return;
    }

    console.log("正在同步至雲端，請勿關閉視窗...");
    document.getElementById('loading-screen').style.display = 'flex';
    
    // 讓畫面提示使用者正在上傳
    const loadingText = document.querySelector('#loading-screen p');
    loadingText.innerText = "圖片上傳中，可能需要數秒至半分鐘，請稍候...";

    const payload = {
        action: 'updateAll',
        f_members: members,
        f_data: flowers,
        f_comps: competitions
    };

    try {
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
        });
        
        console.log("上傳指令發送完畢！準備刷新網址...");
        loadingText.innerText = "正在向雲端索取最新圖庫...";

        // 💡 關鍵修復點：稍微等待 1.5 秒，確保 Google 試算表已經寫入完畢
        await new Promise(resolve => setTimeout(resolve, 1500)); 

        // 💡 強制重新讀取！這會把網頁裡「巨大的圖片代碼」洗掉，換成「短短的 Google 網址」
        await init(); 

        alert("圖片與資料同步成功！");
    } catch (e) {
        console.error("同步出錯:", e);
        alert("同步失敗！請檢查網路。");
        document.getElementById('loading-screen').style.display = 'none';
    }
}
        function renderMembers() {
            const q = (document.getElementById('member-search').value || "").toLowerCase();
            const grid = document.getElementById('member-card-grid');
            const filtered = members.filter(m => m.name.toLowerCase().includes(q) || (m.gameId && m.gameId.toString().includes(q)));
            grid.innerHTML = filtered.map(m => `
                    <div class="member-card" onclick="showMemberCard('${m.id}')">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <strong>${m.name}</strong>
                                <div style="color:#888; font-size:12px;">ID: ${m.gameId || '-'}</div>
                            </div>
                            <button onclick="event.stopPropagation(); showAddMember('${m.id}')" style="background:#007bff; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:12px;">編輯</button>
                        </div>
                    </div>`).join('');
        }

        function showMemberCard(id) {
            const m = members.find(x => x.id.toString() === id.toString());
            const ownedArray = m.ownedFlowers || [];
            const flowerHTML = ownedArray.map(fid => {
                const f = flowers.find(x => x.id.toString() === fid.toString());
                return f ? `<span class="grade-${f.grade}">● ${f.name}</span> ` : '';
            }).join('');
            document.getElementById('modal-body').innerHTML = `<h2>${m.name}</h2><p>ID: ${m.gameId}</p><div>${flowerHTML}</div>`;
            document.getElementById('main-modal').style.display = 'flex';
        }

        // --- 修改後的成員彈窗 (加入搜尋與全選) ---
function openMemberModal(id = null) {
    // 1. 取得成員資料 (處理 id 為 null 或字串 'null' 的情況)
    const targetId = (id === 'null' || id === null) ? null : id;
    const m = targetId ? members.find(x => x.id.toString() === targetId.toString()) : { name: '', gameId: '', ownedFlowers: [] };
    
    // 2. 定義等級權重 (仙品最前)
    const gradeWeight = { "仙品": 1, "華品": 2, "珍品": 3, "普品": 4, "凡品": 5 };

    // 3. 【這就是你要貼的地方】先排序再生成 HTML
    const flowerListHtml = flowers
        .slice() // 複製一份陣列避免影響原始資料
        .sort((a, b) => {
            const weightA = gradeWeight[a.grade] || 99;
            const weightB = gradeWeight[b.grade] || 99;
            if (weightA !== weightB) return weightA - weightB; // 等級排序
            return (b.score || 0) - (a.score || 0); // 同等級看分數
        })
        .map(f => `
            <label class="flower-item" data-name="${f.name}" style="display:flex; align-items:center; gap:8px; font-size:13px; margin:5px 0; cursor:pointer;">
                <input type="checkbox" name="m-flower" value="${f.id}" ${m.ownedFlowers.includes(f.id.toString()) ? 'checked' : ''}>
                <span class="grade-${f.grade}" style="font-weight:bold;">[${f.grade}]</span>
                <span>${f.name}</span>
            </label>
        `).join('');

    // 4. 渲染到彈窗 HTML
    document.getElementById('modal-body').innerHTML = `
        <h3>${targetId ? '修改成員' : '新增成員'}</h3>
        <div class="form-group"><label>遊戲名稱</label><input type="text" id="m-name" value="${m.name}"></div>
        <div class="form-group"><label>遊戲 ID</label><input type="text" id="m-id" value="${m.gameId || ''}"></div>
        
        <div class="form-group">
            <label>擁有花朵管理 (已按等級排序)</label>
            <div style="display:flex; gap:5px; margin-bottom:8px;">
                <input type="text" id="m-flower-search" placeholder="🔍 輸入關鍵字..." oninput="filterMemberFlowers()" style="flex:1; padding:5px; border:1px solid #ccc; border-radius:4px;">
                <button onclick="toggleAllFlowers(true)" type="button" style="font-size:11px; padding:5px; cursor:pointer;">全選</button>
                <button onclick="toggleAllFlowers(false)" type="button" style="font-size:11px; padding:5px; cursor:pointer;">清空</button>
            </div>
            <div id="m-flower-list-container" style="max-height:220px; overflow-y:auto; border:1px solid #ddd; padding:8px; background:#fafafa; border-radius:4px;">
                ${flowerListHtml}
            </div>
        </div>
        
        <button onclick="saveMember('${targetId}')" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:10px;">儲存變更</button>
        ${targetId ? `<button class="admin-btn" onclick="deleteItem('member','${targetId}')" style="width:100%; margin-top:8px; background:#666; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer;">刪除成員</button>` : ''}
    `;
    document.getElementById('main-modal').style.display = 'flex';
}

// --- 輔助函式 1：過濾花朵列表 ---
function filterMemberFlowers() {
    const q = document.getElementById('m-flower-search').value.toLowerCase();
    const items = document.querySelectorAll('.flower-item');
    items.forEach(item => {
        const name = item.getAttribute('data-name').toLowerCase();
        item.style.display = name.includes(q) ? 'flex' : 'none';
    });
}

// --- 輔助函式 2：全選或取消勾選 (僅針對目前搜尋可見的項目) ---
function toggleAllFlowers(checked) {
    const items = document.querySelectorAll('.flower-item');
    items.forEach(item => {
        // 只有顯示出來的（符合搜尋結果的）才會被批次勾選
        if (item.style.display !== 'none') {
            const checkbox = item.querySelector('input[type="checkbox"]');
            checkbox.checked = checked;
        }
    });
}

function saveMember(targetId) {
    const name = document.getElementById('m-name').value;
    const gameId = document.getElementById('m-id').value;
    if (!name) { alert("請輸入名稱"); return; }

    // 取得勾選的花朵 ID
    const checks = document.querySelectorAll('input[name="m-flower"]:checked');
    const ownedFlowers = Array.from(checks).map(c => c.value);

    const data = {
        id: (targetId === 'null' || !targetId) ? Date.now().toString() : targetId,
        name: name,
        gameId: gameId,
        ownedFlowers: ownedFlowers
    };

    if (targetId === 'null' || !targetId) {
        members.push(data);
    } else {
        const idx = members.findIndex(x => x.id.toString() === targetId.toString());
        if (idx !== -1) members[idx] = data;
    }

    renderMembers();
    closeModal();
    saveData(true); // 自動同步
}

function renderFlowers() {
    const q = document.getElementById('flower-search').value.toLowerCase();
    const container = document.getElementById('flower-grid');
    
    // 1. 定義品級權重 (數字越小排越前面)
    const gradeWeight = { "仙品": 1, "華品": 2, "珍品": 3, "普品": 4, "凡品": 5 };

    // 2. 過濾關鍵字並進行排序
    const sortedFlowers = flowers
        .filter(f => f.name.toLowerCase().includes(q))
        .sort((a, b) => {
            const weightA = gradeWeight[a.grade] || 99;
            const weightB = gradeWeight[b.grade] || 99;
            
            // 如果品級不同，按品級排 (仙 -> 凡)
            if (weightA !== weightB) {
                return weightA - weightB;
            }
            // 如果品級相同，按分數高低排 (高分在前)
            return (b.score || 0) - (a.score || 0);
        });

    // 3. 渲染出 HTML
container.innerHTML = sortedFlowers.map(f => `
    <div class="flower-card" onclick="showFlowerDetail('${f.id}')">
        <img src="${f.image || 'https://via.placeholder.com/150'}">
        <div class="name grade-${f.grade}">${f.name}</div>
        <div style="font-size:10px; color:#888;">${f.grade} | ${f.score}分</div>
    </div>
`).join('');
}
        function showFlowerDetail(id) {
            const f = flowers.find(x => x.id.toString() === id.toString());
            if (!f) return;

            // --- 新增：搜尋擁有此花的人 ---
            const owners = members.filter(m =>
                m.ownedFlowers && m.ownedFlowers.map(String).includes(id.toString())
            );

            const ownerListHTML = owners.length > 0
                ? owners.map(m => `<span style="background:#eee; padding:2px 8px; border-radius:10px; margin:2px; display:inline-block; font-size:12px;">${m.name}</span>`).join('')
                : '<span style="color:#999; font-size:12px;">目前無人擁有</span>';
            // ----------------------------

            document.getElementById('modal-body').innerHTML = `
        <div style="text-align:center;">
            <h2 class="grade-${f.grade}">${f.name}</h2>
            <img src="${f.image || 'https://via.placeholder.com/150'}" style="width:100%; border-radius:8px; margin-bottom:10px;">
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; text-align:left; margin-bottom:10px;">
                <p><b>品級：</b><span class="grade-${f.grade}">${f.grade}</span></p>
                <p><b>分數：</b>${f.score} 分</p>
                <p><b>擁有者：</b></p>
                <div style="margin-top:5px;">${ownerListHTML}</div>
            </div>
            ${isAdmin ? `<button onclick="openFlowerModal('${f.id}')" style="margin-top:10px; padding:8px 16px;">編輯花朵</button>` : ''}
        </div>
    `;
            document.getElementById('main-modal').style.display = 'flex';
        }

        function openFlowerModal(editId = null) {
            const f = editId ? flowers.find(x => x.id.toString() === editId.toString()) : null;
            document.getElementById('modal-body').innerHTML = `<h3>花朵設定</h3><div class="form-group"><label>名稱</label><input type="text" id="f-name" value="${f ? f.name : ''}"></div><div class="form-group"><label>分數</label><input type="number" id="f-score" value="${f ? f.score : ''}"></div><div class="form-group"><label>品級</label><select id="f-grade"><option value="仙品">仙品</option><option value="華品">華品</option><option value="珍品">珍品</option><option value="普品">普品</option><option value="凡品">凡品</option></select></div><div class="form-group"><label>照片</label><input type="file" id="f-img" accept="image/*"></div><button class="add-btn" onclick="saveFlower('${editId}')">儲存</button>`;
            if (f) document.getElementById('f-grade').value = f.grade;
            document.getElementById('main-modal').style.display = 'flex';
        }

async function saveFlower(editId) {
    // 取得圖片檔案
    const file = document.getElementById('f-img').files[0];
    let base64 = "";

    // 處理圖片：有選新圖就壓縮，沒選新圖就保留舊的
    if (file) {
        base64 = await compressImage(file, 400, 0.6); 
    } else if (editId && editId !== 'null') {
        const oldFlower = flowers.find(x => x.id.toString() === editId.toString());
        base64 = oldFlower ? oldFlower.image : "";
    }

    // 構建花朵資料 (乾淨版)
    const data = {
        id: (editId && editId !== 'null') ? editId : Date.now().toString(),
        name: document.getElementById('f-name').value,
        grade: document.getElementById('f-grade').value,
        score: parseInt(document.getElementById('f-score').value) || 0,
        image: base64
    };

    if (editId && editId !== 'null') {
        const idx = flowers.findIndex(x => x.id.toString() === editId.toString());
        if (idx !== -1) flowers[idx] = data;
    } else {
        flowers.push(data);
    }

    renderFlowers(); // 立即更新畫面
    closeModal();    // 關閉視窗
    
    await saveData(); // 執行同步至雲端
}

        function renderRecords() {

        function loadMemberFlowersForRecord(preSelected = []) {
            const mid = document.getElementById('r-member-select').value;
            const area = document.getElementById('r-flower-pick-area');
            const m = members.find(x => x.id.toString() === mid.toString());
            if (!m) return;

                const f = flowers.find(x => x.id.toString() === fid.toString());
                return f ? `<label style="display:block;"><input type="checkbox" name="r-flower-check" value="${f.grade}" data-fname="${f.name}" ${preSelected.includes(f.name) ? 'checked' : ''}> ${f.name}</label>` : '';
            }).join('');
        }

        async function saveRecord() {
            const mid = document.getElementById('r-member-select').value;
            const checks = document.querySelectorAll('input[name="r-flower-check"]:checked');
            const m = members.find(x => x.id.toString() === mid);
            const names = Array.from(checks).map(c => c.getAttribute('data-fname'));
            const grades = Array.from(checks).map(c => c.value);
            const order = { "仙品": 1, "華品": 2, "珍品": 3, "普品": 4, "凡品": 5 };
            const max = grades.reduce((a, b) => order[a] < order[b] ? a : b, "凡品");
            const data = { id: window.editingRecordId || Date.now().toString(), memberId: mid, memberName: m.name, maxGrade: max, flowerNames: names.join(', ') };
            if (window.editingRecordId) competitions[competitions.findIndex(x => x.id.toString() === window.editingRecordId)] = data; else competitions.push(data);
            renderRecords(); closeRecordModal(); await saveData();
        }

            window.editingRecordId = id;
            const r = competitions.find(x => x.id.toString() === id.toString());
            document.getElementById('r-member-select').value = r.memberId;
            loadMemberFlowersForRecord(r.flowerNames.split(', '));

    const memberOpts = members.map(m => `<option value="${m.id}" ${r?.memberId==m.id?'selected':''}>${m.name}</option>`).join('');
    
    document.getElementById('modal-body').innerHTML = `
        <h3>${r ? '編輯紀錄' : '新增紀錄'}</h3>
        <div class="form-group">
            <label>選擇成員</label>
            <select id="r-mid" onchange="updateRecordFlowerList()">${memberOpts}</select>
        </div>
        
        <div class="form-group">
            <label>參賽花朵 (多選)</label>
            <div style="display:flex; gap:5px; margin-bottom:8px;">
                <input type="text" id="r-flower-search" placeholder="🔍 搜尋該成員的花..." oninput="filterRecordFlowers()" style="flex:1; padding:5px;">
                <button onclick="toggleRecordFlowers(true)" style="font-size:11px; padding:0 5px;">全選</button>
                <button onclick="toggleRecordFlowers(false)" style="font-size:11px; padding:0 5px;">清空</button>
            </div>
            <div id="r-flower-box" style="border:1px solid #ddd; padding:8px; max-height:150px; overflow-y:auto; background:#fafafa;">
                </div>
        </div>
        
        <button onclick="saveRecord('${id}')" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:4px; font-weight:bold;">儲存紀錄</button>

    `;
    
    // 初始化列表
    updateRecordFlowerList(r ? r.flowerNames.split(', ') : []);

}

// --- 競賽專用輔助功能 ---
function updateRecordFlowerList(checkedNames = []) {
    const mid = document.getElementById('r-mid').value;
    const m = members.find(x => x.id == mid);
    const box = document.getElementById('r-flower-box');
    
    if(!m || !m.ownedFlowers || m.ownedFlowers.length === 0) { 
        box.innerHTML = "<div style='color:#888; text-align:center; padding:10px;'>此成員目前沒有登記任何花朵</div>"; 
        return; 
    }
    
    box.innerHTML = m.ownedFlowers.map(fid => {
        const f = flowers.find(x => x.id == fid);
        if(!f) return '';
        const isChecked = checkedNames.includes(f.name);
        return `
            <label class="r-flower-item" data-name="${f.name}" style="display:flex; align-items:center; gap:8px; margin:5px 0;">
                <input type="checkbox" name="r-f" value="${f.grade}" data-n="${f.name}" ${isChecked ? 'checked' : ''}> 
                <span class="grade-${f.grade}">${f.name}</span>
            </label>`;
    }).join('');
}

function filterRecordFlowers() {
    const q = document.getElementById('r-flower-search').value.toLowerCase();
    const items = document.querySelectorAll('.r-flower-item');
    items.forEach(item => {
        const name = item.getAttribute('data-name').toLowerCase();
        item.style.display = name.includes(q) ? 'flex' : 'none';
    });
}

function toggleRecordFlowers(checked) {
    const items = document.querySelectorAll('.r-flower-item');
    items.forEach(item => {
        if (item.style.display !== 'none') {
            item.querySelector('input').checked = checked;
        }
    });
}
// 圖片壓縮函式
function compressImage(file, maxWidth = 400, quality = 0.6) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > maxWidth) {
                    height = Math.round((height *= maxWidth / width));
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // 壓縮為 JPEG，避免 PNG 過大
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = error => reject(error);
        };
        reader.onerror = error => reject(error);
    });
}
